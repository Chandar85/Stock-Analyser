<script type="text/babel">
const {useState,useReducer,useEffect,useRef} = React;

/* ── Constants ──────────────────────────────────────────────────────── */
const FH = 'https://finnhub.io/api/v1';
const EMBEDDED_KEY = 'd8bclj1r01qhrj7r3670d8bclj1r01qhrj7r367g';

const SECTOR_PE = {
  'Technology':38,'Information Technology':38,'Software':45,'Semiconductors':35,
  'Internet':40,'Health':27,'Biotechnology':30,'Pharmaceutical':22,'Medical':25,
  'Financial':14,'Bank':12,'Insurance':12,'Finance':14,
  'Consumer Discretionary':26,'Retail':25,'Consumer Staples':22,
  'Industrial':23,'Aerospace':25,'Energy':13,'Oil':13,'Materials':19,
  'Real Estate':35,'Utilities':19,'Communication':26,'Telecom':18,
  'Media':22,'Entertainment':24,'Automotive':15,'Electric Vehicle':35,
};

const AI_LEADERS = new Set([
  'NVDA','MSFT','GOOGL','GOOG','META','AMZN','PLTR','AMD','AI','SOUN',
  'BBAI','ORCL','IBM','TSLA','BAIDU','BIDU','SNOW','PATH','UPST'
]);

const WHALES = [
  {name:'Warren Buffett',   icon:'🏦', terms:['buffett','berkshire hathaway','berkshire']},
  {name:'Elon Musk',        icon:'🚀', terms:['elon musk','musk buys','musk purchases','musk']},
  {name:'Donald Trump',     icon:'🇺🇸', terms:['trump','president trump','trump media','donald trump']},
  {name:'Cathie Wood',      icon:'📈', terms:['cathie wood','ark invest','arkk','ark innovation']},
  {name:'Michael Burry',    icon:'🎯', terms:['michael burry','scion asset','burry']},
  {name:'Ray Dalio',        icon:'🌊', terms:['ray dalio','bridgewater associates','bridgewater']},
  {name:'Bill Ackman',      icon:'💼', terms:['bill ackman','ackman','pershing square']},
  {name:'Carl Icahn',       icon:'⚔️',  terms:['carl icahn','icahn enterprises','icahn']},
  {name:'Druckenmiller',    icon:'🎲', terms:['druckenmiller','duquesne capital','stanley druckenmiller']},
  {name:'George Soros',     icon:'🌐', terms:['george soros','soros fund','soros']},
  {name:'Ken Griffin',      icon:'🏰', terms:['ken griffin','citadel']},
  {name:'Saudi PIF',        icon:'🛢️',  terms:['saudi arabia','saudi pif','public investment fund']},
  {name:'SoftBank / Masa',  icon:'🗾', terms:['softbank','masayoshi son','masa son']},
  {name:'Norway Fund',      icon:'🇳🇴', terms:['norges bank','norway fund','government pension fund']},
];

const BUY_WORDS  = ['buy','buys','bought','purchase','purchased','acqui','stake','invest','position','holding','adds','added','accumulate','long','bullish','increase','backed','back','bet on'];
const SELL_WORDS = ['sell','sold','dump','exit','short','bearish','reduce','trim','divest','unload','offload','decrease','cut stake'];
const POS_NEWS = ['beat','beats','record','profit','growth','strong','surge','soar','rise','gain','upgrade','outperform','bullish','positive','exceeds','top','raises guidance'];
const NEG_NEWS = ['miss','misses','loss','losses','decline','weak','fall','drop','downgrade','underperform','cut','lawsuit','warning','concern','disappointing','bearish','negative','probe','investigation'];

/* ── Key storage ────────────────────────────────────────────────────── */
function getKey() { return EMBEDDED_KEY || localStorage.getItem('sa_fh_key') || ''; }
function saveKey(k) { localStorage.setItem('sa_fh_key', k.trim()); }

/* ── Cache helpers ──────────────────────────────────────────────────── */
const CACHE_TTL = 23*60*60*1000;
function getCache(ticker, key) {
  try {
    const raw = localStorage.getItem(`sa_${key}_${ticker}`);
    if (!raw) return null;
    const {ts,data} = JSON.parse(raw);
    if (Date.now()-ts > CACHE_TTL) { localStorage.removeItem(`sa_${key}_${ticker}`); return null; }
    return data;
  } catch(e) { return null; }
}
function setCache(ticker, key, data) {
  try { localStorage.setItem(`sa_${key}_${ticker}`, JSON.stringify({ts:Date.now(),data})); } catch(e) {}
}
function isCached(ticker) { return !!(getCache(ticker,'fhp') && getCache(ticker,'fhm')); }

/* ── Fetch helpers ──────────────────────────────────────────────────── */
async function safeFetch(url, timeoutMs=12000) {
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), timeoutMs);
  try {
    const r = await fetch(url, {signal: ctrl.signal});
    return r;
  } catch(e) {
    if (e.name==='AbortError') throw new Error('Request timed out. Check your internet connection and try again.');
    throw new Error('Network error: ' + e.message);
  } finally { clearTimeout(timer); }
}

/* ── SMA helper ─────────────────────────────────────────────────────── */
function sma(arr, period) {
  if (!arr || arr.length < 1) return null;
  const p = Math.min(period, arr.length);
  const s = arr.slice(-p);
  return s.reduce((a,b)=>a+b, 0) / p;
}

/* ── Candle fetch — 30 days only for S&R calculation ───────────────── */
async function fetchCandles(sym, apiKey) {
  const t = `token=${apiKey}`;
  const now  = Math.floor(Date.now()/1000);
  const from = now - 35*24*60*60; // 35 days buffer → ~25 trading days
  const dr = await safeFetch(`${FH}/stock/candle?symbol=${sym}&resolution=D&from=${from}&to=${now}&${t}`, 12000).catch(()=>null);
  const daily = dr ? await dr.json().catch(()=>null) : null;
  return {daily, weekly:null};
}

/* ── Swing S&R from OHLC data ────────────────────────────────────────── */
function findSwingLevels(highs, lows, currentPrice) {
  const swingHighs = [], swingLows = [];
  const lb = 2; // look 2 bars each side
  for (let i=lb; i<highs.length-lb; i++) {
    const h = highs[i];
    const l = lows[i];
    if (h > Math.max(...highs.slice(i-lb,i), ...highs.slice(i+1,i+lb+1))) swingHighs.push(h);
    if (l < Math.min(...lows.slice(i-lb,i),  ...lows.slice(i+1,i+lb+1)))  swingLows.push(l);
  }
  // Cluster levels within 0.5% of each other, take strongest
  const cluster = (arr) => {
    const sorted = [...new Set(arr.map(v=>Math.round(v*100)/100))].sort((a,b)=>a-b);
    const out = [];
    for (const v of sorted) {
      if (!out.length || v > out[out.length-1]*1.005) out.push(v);
    }
    return out;
  };
  const resistances = cluster(swingHighs.filter(v=>v>currentPrice)).slice(0,2);
  const supports    = cluster(swingLows.filter(v=>v<currentPrice)).reverse().slice(0,2);
  return {
    r1: resistances[0]||null, r2: resistances[1]||null,
    s1: supports[0]||null,    s2: supports[1]||null,
  };
}

/* ── Main data fetch ────────────────────────────────────────────────── */
async function fetchAll(rawTicker, apiKey) {
  const sym = rawTicker.toUpperCase();
  const t = `token=${apiKey}`;

  let profile = getCache(sym,'fhp');
  let metric  = getCache(sym,'fhm');

  const today = new Date().toISOString().split('T')[0];
  const from  = new Date(Date.now()-90*24*60*60*1000).toISOString().split('T')[0];

  const criticalFetches = [];
  if (!profile) criticalFetches.push({key:'profile', url:`${FH}/stock/profile2?symbol=${sym}&${t}`});
  if (!metric)  criticalFetches.push({key:'metric',  url:`${FH}/stock/metric?symbol=${sym}&metric=all&${t}`});
  criticalFetches.push({key:'quote', url:`${FH}/quote?symbol=${sym}&${t}`});

  const criticalResponses = await Promise.all(criticalFetches.map(f => safeFetch(f.url)));

  for (let i=0; i<criticalResponses.length; i++) {
    const s = criticalResponses[i].status;
    if (s===401||s===403) throw new Error('Invalid API key. Double-check your Finnhub key at finnhub.io');
    if (s===429) throw new Error('Rate limit hit (60 req/min). Wait a moment and try again.');
  }

  const criticalParsed = await Promise.all(criticalResponses.map(r=>r.json()));
  const result = {};
  criticalFetches.forEach((f,i)=>{ result[f.key] = criticalParsed[i]; });

  if (result.profile) {
    if (!result.profile.ticker && !result.profile.name)
      throw new Error(`"${sym}" not found. Check the ticker symbol (e.g. AAPL, NVDA, INTC, MSFT).`);
    setCache(sym,'fhp', result.profile);
    profile = result.profile;
  }
  if (result.metric) {
    setCache(sym,'fhm', result.metric);
    metric = result.metric;
  }

  // Step 1: news + insider in parallel (fast, small responses)
  const [newsRes, insiderRes] = await Promise.all([
    safeFetch(`${FH}/company-news?symbol=${sym}&from=${from}&to=${today}&${t}`).catch(()=>null),
    safeFetch(`${FH}/stock/insider-transactions?symbol=${sym}&${t}`).catch(()=>null),
  ]);
  const news    = newsRes    ? await newsRes.json().catch(()=>[])             : [];
  const insider = insiderRes ? await insiderRes.json().catch(()=>({data:[]})) : {data:[]};

  // Step 2: candle data separately — longer timeout (210 days = big payload)
  const now2  = Math.floor(Date.now()/1000);
  const fromC = now2 - 210*24*60*60; // 210 days — enough for 200 DMA
  const candleUrl = `${FH}/stock/candle?symbol=${sym}&resolution=D&from=${fromC}&to=${now2}&${t}`;
  const candleRes = await safeFetch(candleUrl, 20000).catch(()=>null);
  const daily   = candleRes  ? await candleRes.json().catch(()=>null)         : null;
  const weekly  = null;

  return {
    profile, metric,
    quote:   result.quote || {},
    news:    Array.isArray(news) ? news : [],
    insider: insider || {data:[]},
    daily:   daily || null,
    weekly:  null,
  };
}

/* ── Sector PE lookup ───────────────────────────────────────────────── */
function getSectorPe(industry) {
  const txt = (industry||'').toLowerCase();
  for (const [k,v] of Object.entries(SECTOR_PE))
    if (txt.includes(k.toLowerCase())) return v;
  return 22;
}

/* ── Scoring F1-F8 ──────────────────────────────────────────────────── */

function scoreF1(metric) {
  const m = metric?.metric || {};
  const yoy = m.revenueGrowthTTMYoy ?? m.salesGrowthTTMYoy;
  const g3y = m.revenueGrowth3Y ?? m.revenueGrowthAnnual;
  const pct = yoy ?? g3y;
  if (pct==null) return {score:2,label:'Revenue Growth',detail:'Revenue data not available',color:'#64748b'};
  const trend = (yoy!=null&&g3y!=null) ? (yoy>g3y+5?' (accelerating 🚀)':yoy<g3y-5?' (decelerating ⚠️)':'') : '';
  let score, detail;
  if      (pct>=25) {score=5; detail=`Revenue +${pct.toFixed(1)}% YoY — exceptional${trend}`;}
  else if (pct>=12) {score=4; detail=`Revenue +${pct.toFixed(1)}% YoY — solid growth${trend}`;}
  else if (pct>=0)  {score=3; detail=`Revenue +${pct.toFixed(1)}% YoY — modest growth${trend}`;}
  else if (pct>=-10){score=2; detail=`Revenue ${pct.toFixed(1)}% YoY — slight decline${trend}`;}
  else              {score=1; detail=`Revenue ${pct.toFixed(1)}% YoY — significant decline${trend}`;}
  return {score,label:'Revenue Growth',detail,color:barColor(score)};
}

function scoreF2(metric) {
  const m = metric?.metric || {};
  let gm = m.grossMarginTTM ?? m.grossMargin ?? m.grossProfitMarginTTM;
  let om = m.operatingMarginTTM ?? m.operatingMargin ?? m.ebitdaMarginTTM;
  if (gm==null && om==null) return {score:2,label:'Margin Quality',detail:'Margin data not available',color:'#64748b'};
  if (gm!=null && Math.abs(gm)<=1) gm*=100;
  if (om!=null && Math.abs(om)<=1) om*=100;
  let pts=0, max=0, parts=[];
  if (gm!=null) {
    max+=2; pts+=gm>=70?2:gm>=50?1.5:gm>=30?1:gm>=0?0.5:0;
    parts.push(`Gross margin ${gm.toFixed(0)}%${gm>=70?' (elite ✓)':gm>=50?' (strong ✓)':gm>=30?' (moderate)':' (thin)'}`);
  }
  if (om!=null) {
    max+=3; pts+=om>=25?3:om>=15?2.5:om>=5?2:om>0?1:0;
    parts.push(`Op margin ${om.toFixed(0)}%${om>=25?' (highly efficient ✓)':om>=15?' (efficient ✓)':om>0?' (positive)':' (loss-making ⚠️)'}`);
  }
  const score = max>0?Math.max(1,Math.min(5,Math.round(pts/max*5))):2;
  return {score,label:'Margin Quality',detail:parts.join('. '),color:barColor(score)};
}

function scoreF3(metric) {
  const m = metric?.metric || {};
  let roe = m.roeTTM ?? m.roeRfy ?? m.roeAnnual;
  const raw = m['totalDebt/totalEquityAnnual'] ?? m['totalDebt/totalEquityQuarterly'];
  if (roe==null && raw==null) return {score:2,label:'Financial Strength',detail:'Data not available',color:'#64748b'};
  if (roe!=null && Math.abs(roe)<=1) roe*=100;
  const de = raw!=null?(raw>10?raw/100:raw):null;
  let pts=0, max=0, parts=[];
  if (roe!=null) {
    max+=5; pts+=roe>=25?5:roe>=15?4:roe>=8?3:roe>=0?2:1;
    parts.push(`ROE ${roe.toFixed(1)}%${roe>=25?' (exceptional ✓)':roe>=15?' (above avg ✓)':roe>=8?' (decent)':' (weak)'}`);
  }
  if (de!=null) {
    max+=5; pts+=de<0.3?5:de<0.8?4:de<1.5?3:de<3?2:1;
    parts.push(`D/E ${de.toFixed(2)}${de<0.3?' (very low debt ✓)':de<0.8?' (manageable ✓)':de<1.5?' (moderate)':' (high leverage ⚠️)'}`);
  }
  const score = max>0?Math.max(1,Math.min(5,Math.round(pts/max*5))):2;
  return {score,label:'Financial Strength',detail:parts.join('. '),color:barColor(score)};
}

function scoreF4(quote, metric, priceTarget) {
  const m = metric?.metric || {};
  const hi=m['52WeekHigh'], lo=m['52WeekLow'], cur=quote.c;
  if (!hi||!lo||!cur||hi<=lo) return {score:3,label:'Price Timing',detail:'Price data not available',color:'#64748b'};
  const pos=(cur-lo)/(hi-lo);
  let score;
  if      (pos<0.20) score=5;
  else if (pos<0.40) score=4;
  else if (pos<0.65) score=3;
  else if (pos<0.85) score=2;
  else               score=1;
  let detail = `${(pos*100).toFixed(0)}% of 52-wk range ($${lo.toFixed(0)}–$${hi.toFixed(0)})`;
  const target = priceTarget?.targetMean || priceTarget?.targetMedian;
  if (target && cur>0) {
    const upside=(target-cur)/cur*100;
    if (upside>20) { detail+=`. Analyst target $${target.toFixed(0)} (+${upside.toFixed(0)}% upside ✓)`; if(score<5) score=Math.min(score+1,5); }
    else if (upside>5) detail+=`. Analyst target $${target.toFixed(0)} (+${upside.toFixed(0)}%)`;
    else if (upside<-10){ detail+=`. Analyst target $${target.toFixed(0)} (downside risk ⚠️)`; if(score>1) score=Math.max(score-1,1); }
  }
  return {score,label:'Price Timing',detail,color:barColor(score)};
}

function scoreF5(metric) {
  const m = metric?.metric || {};
  const beta = m.beta;
  let npm = m.netProfitMarginTTM ?? m.netProfitMarginAnnual ?? m.netMarginTTM;
  if (beta==null && npm==null) return {score:3,label:'Risk Profile',detail:'Risk data not available',color:'#64748b'};
  if (npm!=null && Math.abs(npm)<=1) npm*=100;
  let pts=0, max=0, parts=[];
  if (beta!=null) {
    max+=5; pts+=beta<0.5?5:beta<0.8?4:beta<1.2?3:beta<1.8?2:1;
    parts.push(`Beta ${beta.toFixed(2)}${beta<0.8?' (low volatility ✓)':beta<1.2?' (market-like)':beta<1.8?' (volatile)':' (very volatile ⚠️)'}`);
  }
  if (npm!=null) {
    max+=5; pts+=npm>=20?5:npm>=10?4:npm>=3?3:npm>=0?2:1;
    parts.push(`Net margin ${npm.toFixed(1)}%${npm>=20?' (excellent ✓)':npm>=10?' (healthy ✓)':npm>=3?' (thin)':' (unprofitable ⚠️)'}`);
  }
  const score=max>0?Math.max(1,Math.min(5,Math.round(pts/max*5))):3;
  return {score,label:'Risk Profile',detail:parts.join('. '),color:barColor(score)};
}

function scoreF6(profile, metric) {
  const m = metric?.metric || {};
  const pe = m.peTTM || m.peNormalizedAnnual || m.peExclExtraTTM;
  if (!pe||pe<=0||pe>600) return {score:2,label:'Valuation',detail:'P/E not available',color:'#64748b'};
  const spe = getSectorPe(profile.finnhubIndustry);
  const ratio = pe/spe;
  let score, detail;
  if      (ratio<0.6)  {score=5; detail=`P/E ${pe.toFixed(1)} — deeply undervalued vs sector avg (${spe})`;}
  else if (ratio<0.85) {score=4; detail=`P/E ${pe.toFixed(1)} — below sector avg (${spe}) — attractive`;}
  else if (ratio<1.15) {score=3; detail=`P/E ${pe.toFixed(1)} — fairly valued vs sector (${spe})`;}
  else if (ratio<1.5)  {score=2; detail=`P/E ${pe.toFixed(1)} — pricey vs sector (${spe})`;}
  else                 {score=1; detail=`P/E ${pe.toFixed(1)} — expensive vs sector avg (${spe})`;}
  const pb = m.pbAnnual ?? m.priceToBookTTM;
  if (pb!=null) detail += `. P/B ${pb.toFixed(1)}`;
  return {score,label:'Valuation',detail,color:barColor(score)};
}

  if (isTechSector)
    return {score:2, label:'🤖 AI Advantage', detail:`Technology sector — potential AI beneficiary but no specific AI moat detected`, level:'participant', color:'#64748b'};

function scoreF8(profile, news, insider) {
  const sym  = (profile.ticker||'').toUpperCase();
  const name = (profile.name||'').toLowerCase();
  const whaleHits = [];
  for (const a of news.slice(0,50)) {
    const txt = ((a.headline||'')+(a.summary||'')).toLowerCase();
    const mentionsTicker = txt.includes(sym.toLowerCase()) || (name.length>4 && txt.includes(name));
    if (!mentionsTicker) continue;
    for (const whale of WHALES) {
      if (whaleHits.find(h=>h.name===whale.name)) continue;
      if (!whale.terms.some(t=>txt.includes(t))) continue;
      const isBuy  = BUY_WORDS.some(k=>txt.includes(k));
      const isSell = SELL_WORDS.some(k=>txt.includes(k));
      whaleHits.push({name:whale.name, icon:whale.icon, action:isSell?'sell':(isBuy?'buy':'mention'), title:a.headline});
    }
  }
  const cutoff = Date.now()-180*24*60*60*1000;
  const trades = (insider?.data||[]).filter(t=>{
    const d = new Date(t.transactionDate||t.filingDate||0);
    return d.getTime() > cutoff;
  });
  const iBuys  = trades.filter(t=>t.transactionCode==='P');
  const iSells = trades.filter(t=>t.transactionCode==='S');
  const buyCount  = whaleHits.filter(h=>h.action==='buy').length;
  const sellCount = whaleHits.filter(h=>h.action==='sell').length;
  let score=3, detail='No notable activity detected';
  if      (buyCount>=2)                         {score=5; detail=`${buyCount} major investors buying!`;}
  else if (buyCount===1 && iBuys.length>=2)     {score=5; detail=`${whaleHits.find(h=>h.action==='buy').name} + ${iBuys.length} insider buys`;}
  else if (buyCount===1)                        {score=4; detail=`${whaleHits.find(h=>h.action==='buy').name} buying`;}
  else if (iBuys.length>=3)                     {score=4; detail=`${iBuys.length} insider purchases (Form 4)`;}
  else if (iBuys.length>=1)                     {score=3; detail=`${iBuys.length} insider purchase(s)`;}
  else if (sellCount>=2||iSells.length>=3)      {score=2; detail:`Heavy insider/whale selling`;}
  else if (sellCount===1)                       {score=2; detail:`${whaleHits.find(h=>h.action==='sell').name} selling`;}
  const insiders = [
    ...iBuys.slice(0,3).map(t=>({name:t.name,date:t.transactionDate,action:'buy',val:t.value})),
    ...iSells.slice(0,3).map(t=>({name:t.name,date:t.transactionDate,action:'sell',val:t.value})),
  ];
  return {score,label:'Whale / Insider Activity',detail,color:barColor(score),whales:whaleHits,insiders};
}

/* ── Calculate Technicals ───────────────────────────────────────────── */
function calculateTechnicals(daily, weekly, currentPrice, m) {
  const price  = currentPrice;
  m = m || {};

  // ── Metric-based indicators (always available) ──
  const hi52 = m['52WeekHigh'];
  const lo52 = m['52WeekLow'];

  // 52-week range position
  let rangePos = null;
  if (hi52 && lo52 && price && hi52 > lo52) {
    const pct = Math.max(0, Math.min(1, (price-lo52)/(hi52-lo52)));
    const zones = [
      {max:0.20,label:'📉 Near 52-Wk Low',  detail:'At low end of annual range — potential value zone',   color:'#4ade80',zone:'bottom'},
      {max:0.40,label:'⬇️ Lower Range',      detail:'Below midpoint of 52-week range',                     color:'#86efac',zone:'lower'},
      {max:0.60,label:'➡️ Mid Range',        detail:'Near middle of 52-week range — neutral',              color:'#fde047',zone:'middle'},
      {max:0.80,label:'⬆️ Upper Range',      detail:'Above midpoint of 52-week range',                     color:'#fbbf24',zone:'upper'},
      {max:1.00,label:'📈 Near 52-Wk High', detail:'At high end of annual range — exercise caution',      color:'#f87171',zone:'top'},
    ];
    rangePos = {...(zones.find(z=>pct<=z.max)||zones[4]), pct:Math.round(pct*100)};
  }

  // Volume momentum from metric (10D avg vs 3M avg — both in millions)
  let vol = null;
  const v10 = m['10DayAverageTradingVolume'];
  const v3m = m['3MonthAverageTradingVolume'];
  if (v10 && v3m && v3m > 0) {
    const r = v10 / v3m;
    vol = {
      current: v10*1e6, avg: v3m*1e6, ratio: r,
      label:  r>=2.0?'🔥🔥 Extreme Volume':r>=1.5?'🔥 High Momentum':r>=0.7?'➡️ Normal Volume':'⬇️ Low Volume',
      color:  r>=1.5?'#4ade80':r>=0.7?'#94a3b8':'#f87171',
      signal: r>=1.5?'high':r>=0.7?'neutral':'low',
    };
  }

  // Price performance from metric
  const ret = {
    w13: m['13WeekPriceReturnDaily'],
    w26: m['26WeekPriceReturnDaily'],
    w52: m['52WeekPriceReturnDaily'],
    ytd: m['yearToDatePriceReturnDaily'],
  };

  const support    = lo52 || null;
  const resistance = hi52 || null;

  // ── Candle-based swing S&R (bonus when available) ──
  // Accept data even if s !== 'ok' — Finnhub sometimes returns 'no_data' status with valid prices
  const rawC = daily?.c || [];
  const validCloses = rawC.filter(v => v && v > 0);
  if (validCloses.length < 6) {
    return {rangePos, vol, ret, swingLevels:null, bb:null, bbPos:null, metricOnly:true};
  }

  const closes  = validCloses;
  const rawH = daily.h || [];
  const rawL = daily.l || [];
  const highs   = rawH.filter(v=>v&&v>0).length >= 6 ? rawH.filter(v=>v&&v>0) : closes;
  const lows    = rawL.filter(v=>v&&v>0).length >= 6 ? rawL.filter(v=>v&&v>0) : closes;
  const volumes = daily.v || [];
  const n       = closes.length;

  // Moving Averages
  const ma20  = n >= 20  ? sma(closes, 20)              : null;
  const ma50  = n >= 50  ? sma(closes, 50)              : null;
  const ma200 = n >= 100 ? sma(closes, Math.min(200,n)) : null;

  const maSignal = (ma, lbl) => ma ? {
    val: ma,
    label: price > ma
      ? `Stock trading ABOVE ${lbl} ($${ma.toFixed(2)}) ✓`
      : `Stock trading BELOW ${lbl} ($${ma.toFixed(2)}) ⚠️`,
    short: price > ma ? 'Above ✓' : 'Below ⚠️',
    color: price > ma ? '#4ade80' : '#f87171'
  } : null;
  const s20  = maSignal(ma20,  '20 DMA');
  const s50  = maSignal(ma50,  '50 DMA');
  const s200 = maSignal(ma200, '200 DMA');

  // Bollinger Bands — 20-day
  let bb = null, bbPos = null;
  if (n >= 20) {
    const sl   = closes.slice(-20);
    const mean = sl.reduce((a,b)=>a+b,0)/20;
    const std  = Math.sqrt(sl.reduce((a,b)=>a+Math.pow(b-mean,2),0)/20);
    bb = {upper:mean+2*std, middle:mean, lower:mean-2*std};
    const range = bb.upper - bb.lower;
    const pct   = range>0 ? Math.max(0,Math.min(1,(price-bb.lower)/range)) : 0.5;
    const zones = [
      {max:0.15,label:'📉 Lower Band',  detail:'Potentially oversold — watch for reversal', color:'#4ade80',zone:'bottom'},
      {max:0.40,label:'⬇️ Lower Half',  detail:'Below midpoint — momentum building possible',color:'#86efac',zone:'lower'},
      {max:0.60,label:'➡️ Middle Band', detail:'At 20-day average — neutral',               color:'#fde047',zone:'middle'},
      {max:0.85,label:'⬆️ Upper Half',  detail:'Above midpoint — momentum intact',           color:'#fbbf24',zone:'upper'},
      {max:1.00,label:'📈 Upper Band',  detail:'Potentially overbought — caution on entries',color:'#f87171',zone:'top'},
    ];
    bbPos = {...(zones.find(z=>pct<=z.max)||zones[4]), pct:Math.round(pct*100)};
  }

  // Volume from candles (override metric-based if available)
  if (volumes.length >= 5) {
    const avg = sma(volumes.slice(0,-1), Math.min(20, volumes.length-1));
    const cur = volumes[volumes.length-1];
    if (avg && avg > 0) {
      const r = cur/avg;
      vol = {
        current:cur, avg, ratio:r,
        label:  r>=2.0?'🔥🔥 Extreme Volume':r>=1.5?'🔥 High Momentum':r>=0.7?'➡️ Normal Volume':'⬇️ Low Volume',
        color:  r>=1.5?'#4ade80':r>=0.7?'#94a3b8':'#f87171',
        signal: r>=1.5?'high':r>=0.7?'neutral':'low',
      };
    }
  }

  // Swing-based Support & Resistance from chart data
  const swingLevels = findSwingLevels(highs, lows, price);

  return {rangePos, vol, ret, swingLevels, bb, bbPos, s20, s50, s200, ma20, ma50, ma200, metricOnly:false};
}

/* ── Analyse ────────────────────────────────────────────────────────── */
async function analyze(ticker, apiKey) {
  const {profile,metric,quote,news,insider,daily,weekly} = await fetchAll(ticker, apiKey);
  const m = metric?.metric || {};

  const price  = quote.c || 0;
  const chgPct = quote.dp || 0;
  const mktCap = (profile.marketCapitalization||0)*1e6;

  let div = m.dividendYieldIndicatedAnnual || 0;
  if (div>0 && div<0.5) div*=100;

  const f1 = scoreF1(metric);
  const f2 = scoreF2(metric);
  const f3 = scoreF3(metric);
  const f4 = scoreF4(quote, metric, null);
  const f5 = scoreF5(metric);
  const f6 = scoreF6(profile, metric);
  const f7 = scoreF7(profile, news);
  const f8 = scoreF8(profile, news, insider);

  const factors  = [f1,f2,f3,f4,f5,f6,f7,f8];
  const scored   = factors.filter(f=>f.score!=null);
  const total    = scored.reduce((s,f)=>s+f.score,0);
  const maxScore = scored.length*5;
  const pct      = maxScore>0?Math.round(total/maxScore*100):0;

  let verdict, verdictClass;
  if      (pct>=80){verdict='Strong Buy';  verdictClass='v-strong-buy';}
  else if (pct>=65){verdict='Buy';         verdictClass='v-buy';}
  else if (pct>=45){verdict='Hold';        verdictClass='v-hold';}
  else if (pct>=30){verdict='Sell';        verdictClass='v-sell';}
  else             {verdict='Strong Sell'; verdictClass='v-strong-sell';}

  const topNews = news.slice(0,6).map(a=>{
    const txt = ((a.headline||'')+(a.summary||'')).toLowerCase();
    const p = POS_NEWS.some(w=>txt.includes(w));
    const n = NEG_NEWS.some(w=>txt.includes(w));
    const sentiment = p&&!n?'Bullish':n&&!p?'Bearish':'Neutral';
    return {title:a.headline, url:a.url, sentiment, source:a.source};
  });

  const technicals = calculateTechnicals(daily, weekly, price, m);

  return {
    symbol:  profile.ticker  || ticker.toUpperCase(),
    name:    profile.name    || ticker,
    sector:  profile.finnhubIndustry || profile.sector || '—',
    flag:'🇺🇸', currency:'$',
    price, chgPct, mktCap,
    pe:   m.peTTM || m.peNormalizedAnnual || null,
    eps:  m.epsTTM || m.epsNormalizedAnnual || null,
    div,
    hi52: m['52WeekHigh'] || null,
    lo52: m['52WeekLow']  || null,
    beta: m.beta           || null,
    factors, total, maxScore, pct, verdict, verdictClass,
    isAI: AI_LEADERS.has((profile.ticker||'').toUpperCase()),
    topNews,
    f8details:{whales:f8.whales, insiders:f8.insiders},
    technicals,
    rawMetric: m,
  };
}

/* ── State management ───────────────────────────────────────────────── */
const INIT = {ticker:'',step:'home',results:null,error:null};
function reducer(state,action){
  switch(action.type){
    case 'TICKER':      return {...state,ticker:action.v.toUpperCase()};
    case 'LOAD':        return {...state,step:'loading',error:null};
    case 'DONE':        return {...state,step:'results',results:action.v};
    case 'ERR':         return {...state,step:'error',error:action.v};
    case 'RESET':       return INIT;
    case 'UPDATE_TECH': return {...state,results:{...state.results,technicals:action.v}};
    default: return state;
  }
}

/* ── UI helpers ─────────────────────────────────────────────────────── */
function barColor(s){ return s>=4?'#4ade80':s===3?'#fde047':'#f87171'; }
function fmt(n){
  if(n>=1e12) return `$${(n/1e12).toFixed(2)}T`;
  if(n>=1e9)  return `$${(n/1e9).toFixed(2)}B`;
  if(n>=1e6)  return `$${(n/1e6).toFixed(2)}M`;
  return `$${n.toLocaleString()}`;
}
function fmtVol(v){
  if(v==null||v===0) return '—';
  if(v>=1e9) return `${(v/1e9).toFixed(2)}B`;
  if(v>=1e6) return `${(v/1e6).toFixed(2)}M`;
  if(v>=1e3) return `${(v/1e3).toFixed(0)}K`;
  return v.toFixed(0);
}
function sentClass(s){
  if(!s) return 'sent-neu';
  const l=s.toLowerCase();
  if(l.includes('bull')||l==='positive') return 'sent-bull';
  if(l.includes('bear')||l==='negative') return 'sent-bear';
  return 'sent-neu';
}

/* ── Financial Details Section ──────────────────────────────────────── */
function FinancialDetailsSection({m}) {
  const [expanded, setExpanded] = useState(false);

  const n  = (v,d=1) => v!=null ? v.toFixed(d) : null;
  const pf = v => { if(v==null) return '—'; const x=Math.abs(v)<=1?v*100:v; return `${x.toFixed(1)}%`; };
  const nf = (v,d=1) => v!=null ? v.toFixed(d) : '—';
  const mf = v => v!=null ? (v>=1e9?`$${(v/1e9).toFixed(1)}B`:v>=1e6?`$${(v/1e6).toFixed(1)}M`:v>=1e3?`$${(v/1e3).toFixed(0)}K`:`$${v.toFixed(0)}`) : '—';

  // Top 10 key parameters that drive the score
  const keyParams = [
    {n:'Revenue Growth (YoY)', v:pf(m.revenueGrowthTTMYoy??m.salesGrowthTTMYoy)},
    {n:'EPS Growth (YoY)',      v:pf(m.epsGrowthTTMYoy)},
    {n:'Gross Margin',          v:pf(m.grossMarginTTM??m.grossMarginAnnual)},
    {n:'Operating Margin',      v:pf(m.operatingMarginTTM??m.operatingMarginAnnual)},
    {n:'ROE',                   v:pf(m.roeTTM??m.roeRfy)},
    {n:'Debt / Equity',         v:nf(m['totalDebt/totalEquityAnnual']??m['totalDebt/totalEquityQuarterly'])},
    {n:'P/E Ratio (TTM)',        v:nf(m.peTTM??m.peExclExtraTTM)},
    {n:'P/B Ratio',              v:nf(m.pbAnnual??m.pbQuarterly)},
    {n:'Free Cash Flow',         v:mf(m.freeCashFlowTTM??m.freeCashFlowAnnual)},
    {n:'Current Ratio',          v:nf(m.currentRatioAnnual??m.currentRatioQuarterly)},
  ];

  const categories = [
    { title:'📈 Growth', items:[
      {n:'Revenue Growth (YoY)',  v:pf(m.revenueGrowthTTMYoy??m.salesGrowthTTMYoy)},
      {n:'Revenue Growth (3Y)',   v:pf(m.revenueGrowth3Y)},
      {n:'Revenue Growth (5Y)',   v:pf(m.revenueGrowth5Y)},
      {n:'EPS Growth (YoY)',      v:pf(m.epsGrowthTTMYoy)},
      {n:'EPS Growth (3Y)',       v:pf(m.epsGrowth3Y)},
      {n:'EPS Growth (5Y)',       v:pf(m.epsGrowth5Y)},
      {n:'EBITDA CAGR (5Y)',      v:pf(m.ebitdaCagr5Y)},
    ]},
    { title:'💰 Profitability', items:[
      {n:'Gross Margin',          v:pf(m.grossMarginTTM??m.grossMarginAnnual)},
      {n:'Operating Margin',      v:pf(m.operatingMarginTTM??m.operatingMarginAnnual)},
      {n:'Net Margin',            v:pf(m.netProfitMarginTTM??m.netProfitMarginAnnual)},
      {n:'Pretax Margin',         v:pf(m.pretaxMarginTTM??m.pretaxMarginAnnual)},
      {n:'ROE',                   v:pf(m.roeTTM??m.roeRfy)},
      {n:'ROA',                   v:pf(m.roaTTM??m.roaRfy)},
      {n:'ROI',                   v:pf(m.roiTTM??m.roiAnnual)},
    ]},
    { title:'📊 Valuation', items:[
      {n:'P/E (TTM)',              v:nf(m.peTTM??m.peExclExtraTTM)},
      {n:'P/E (Normalized)',       v:nf(m.peNormalizedAnnual)},
      {n:'P/B',                   v:nf(m.pbAnnual??m.pbQuarterly)},
      {n:'P/S',                   v:nf(m.psAnnual??m.psTTM)},
      {n:'P/FCF',                 v:nf(m.pfcfShareAnnual??m.pfcfShareTTM)},
      {n:'EV/FCF (TTM)',           v:nf(m['currentEv/freeCashFlowTTM'])},
    ]},
    { title:'🏦 Financial Health', items:[
      {n:'Current Ratio',          v:nf(m.currentRatioAnnual??m.currentRatioQuarterly)},
      {n:'Quick Ratio',            v:nf(m.quickRatioAnnual??m.quickRatioQuarterly)},
      {n:'Debt / Equity',          v:nf(m['totalDebt/totalEquityAnnual']??m['totalDebt/totalEquityQuarterly'])},
      {n:'LT Debt / Equity',       v:nf(m['longTermDebt/equityAnnual']??m['longTermDebt/equityQuarterly'])},
      {n:'Free Cash Flow',         v:mf(m.freeCashFlowTTM??m.freeCashFlowAnnual)},
      {n:'Interest Coverage',      v:nf(m.netInterestCoverageTTM??m.netInterestCoverageAnnual)},
    ]},
    { title:'📋 Per Share', items:[
      {n:'EPS (TTM)',              v:`$${nf(m.epsExclExtraItemsTTM??m.epsTTM??m.epsNormalizedAnnual,2)}`},
      {n:'Book Value / Share',     v:`$${nf(m.bookValuePerShareAnnual,2)}`},
      {n:'FCF / Share',            v:`$${nf(m.freeCashFlowPerShareTTM??m.cashFlowPerShareTTM,2)}`},
      {n:'Revenue / Share',        v:`$${nf(m.revenuePerShareTTM??m.salesPerShareTTM,2)}`},
      {n:'Cash / Share',           v:`$${nf(m.cashPerSharePerShareAnnual,2)}`},
    ]},
    { title:'💵 Dividends', items:[
      {n:'Dividend Yield',         v:pf(m.dividendYieldIndicatedAnnual??m.currentDividendYieldTTM)},
      {n:'Dividend / Share',       v:`$${nf(m.dividendPerShareAnnual,2)}`},
      {n:'Payout Ratio',           v:pf(m.payoutRatioAnnual??m.payoutRatioTTM)},
      {n:'Dividend Growth (5Y)',   v:pf(m.dividendGrowthRate5Y)},
    ]},
    { title:'📉 Returns & Trading', items:[
      {n:'YTD Return',             v:pf(m.yearToDatePriceReturnDaily)},
      {n:'52W Return',             v:pf(m['52WeekPriceReturnDaily'])},
      {n:'26W Return',             v:pf(m['26WeekPriceReturnDaily'])},
      {n:'13W Return',             v:pf(m['13WeekPriceReturnDaily'])},
      {n:'Avg Volume (10D)',        v:m['10DayAverageTradingVolume']!=null?`${m['10DayAverageTradingVolume'].toFixed(2)}M`:'—'},
      {n:'Avg Volume (3M)',         v:m['3MonthAverageTradingVolume']!=null?`${m['3MonthAverageTradingVolume'].toFixed(2)}M`:'—'},
    ]},
  ];

  return (
    <div className="section-card" style={{marginBottom:16}}>
      <h2>📊 Financial Details</h2>

      {/* Top 10 key parameters */}
      <div style={{marginBottom:4}}>
        <div style={{fontSize:'.65rem',color:'#475569',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>
          ⭐ Key Parameters (Score Drivers)
        </div>
        <div className="fin-grid">
          {keyParams.map((item,i)=>(
            <div key={i} className="fin-item fin-key">
              <span className="fn">{item.n}</span>
              <span className="fv" style={{color:item.v==='—'?'#475569':'#e2e8f0'}}>{item.v}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Expandable full metrics */}
      <button className="fin-toggle" onClick={()=>setExpanded(!expanded)}>
        <span>All Financial Parameters</span>
        <span style={{fontSize:'.8rem'}}>{expanded ? '▲ Hide' : '▼ Show all'}</span>
      </button>

      {expanded && (
        <div>
          {categories.map((cat,ci)=>(
            <div key={ci} className="fin-category">
              <div className="fin-cat-title">{cat.title}</div>
              <div className="fin-grid">
                {cat.items.map((item,ii)=>(
                  <div key={ii} className="fin-item">
                    <span className="fn">{item.n}</span>
                    <span className="fv" style={{color:item.v==='—'||item.v==='$—'?'#475569':'#e2e8f0'}}>{item.v}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Home screen ────────────────────────────────────────────────────── */
function HomeScreen({state,dispatch,apiKey,onResetKey}){
  const [cached,setCached]=useState(false);
  const onChange = e=>{
    const v=e.target.value.replace(/[^A-Za-z.]/g,'').toUpperCase();
    dispatch({type:'TICKER',v});
    setCached(v.length>0&&isCached(v));
  };
  const doAnalyze = async()=>{
    if(!state.ticker.trim()) return;
    dispatch({type:'LOAD'});
    try {
      const r = await analyze(state.ticker.trim(), apiKey);
      dispatch({type:'DONE',v:r});
    } catch(e) { dispatch({type:'ERR',v:e.message}); }
  };
  return (
    <div>
      <div className="header">
        <h1>📊 Stock Analyzer</h1>
        <p>AI-powered US stock analysis</p>
        <span className="badge">🟢 Finnhub · 60 req/min · No daily limit</span>
      </div>
      <div className="card">
        <div style={{fontSize:'.85rem',color:'#94a3b8',marginBottom:4}}>Enter a US ticker symbol</div>
        <div className="search-row">
          <input className="ticker-input" value={state.ticker} onChange={onChange}
            onKeyDown={e=>e.key==='Enter'&&doAnalyze()}
            placeholder="e.g. AAPL, NVDA, INTC" maxLength={10}
            autoCapitalize="characters" autoCorrect="off" autoComplete="off" spellCheck="false"/>
          <button className="btn btn-primary" onClick={doAnalyze}>Analyze</button>
        </div>
        {cached&&<div className="cache-hint">⚡ Cached — instant result</div>}
        <div style={{marginTop:14,display:'flex',flexWrap:'wrap',gap:8}}>
          {['AAPL','NVDA','MSFT','INTC','TSLA','AMZN'].map(t=>(
            <button key={t} className="btn btn-secondary btn-sm"
              onClick={()=>{dispatch({type:'TICKER',v:t});setCached(isCached(t));}}>
              {t}
            </button>
          ))}
        </div>
      </div>
      <div style={{textAlign:'center',marginTop:10}}>
        <button onClick={onResetKey} style={{background:'none',border:'none',color:'#475569',fontSize:'.72rem',cursor:'pointer'}}>
          Change API key
        </button>
      </div>
      <div className="disclaimer">Data via Finnhub · For educational purposes only · Not financial advice</div>
    </div>
  );
}

                <div key={i} className="insider-row">
                  <div>
                    <span style={{color:'#e2e8f0',fontWeight:600}}>{ins.name}</span>
                    <span style={{color:'#475569',marginLeft:8,fontSize:'.72rem'}}>{ins.date}</span>
                  </div>
                  <span style={{color:ins.action==='buy'?'#4ade80':'#f87171',fontWeight:700}}>
                    {ins.action==='buy'?'▲ Buy':'▼ Sell'}
                    {ins.val? ` · $${(ins.val/1e3).toFixed(0)}K` : ''}
                  </span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* News */}
      {r.topNews.length>0&&(
        <div className="section-card">
          <h2>📰 Recent News</h2>
          {r.topNews.map((n,i)=>(
            <div key={i} className="news-item">
              <div className="news-title">
                {n.url?<a href={n.url} target="_blank" rel="noopener noreferrer">{n.title}</a>:n.title}
              </div>
              <div className="news-meta">
                <span>{n.source}</span>
                <span className={sentClass(n.sentiment)}>{n.sentiment}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Factor breakdown */}
      <div className="section-card">
        <h2>📋 Factor Breakdown</h2>
        {r.factors.map((f,i)=>(
          <div key={i} style={{padding:'8px 0',borderBottom:'1px solid #1e293b',display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
            <div>
              <div style={{fontSize:'.85rem',color:'#e2e8f0',fontWeight:600}}>{f.label}</div>
              <div style={{fontSize:'.75rem',color:'#64748b',marginTop:2}}>{f.detail}</div>
            </div>
            <div style={{fontWeight:800,fontSize:'1rem',color:f.score!=null?barColor(f.score):'#475569',flexShrink:0}}>{f.score!=null?`${f.score}/5`:'N/A'}</div>
          </div>
        ))}
      </div>

      <div className="disclaimer">
        Data from Finnhub. For educational purposes only.<br/>
        Not financial advice. Always do your own research.
      </div>
    </div>
  );
}

/* ── App root ───────────────────────────────────────────────────────── */
function App(){
  const [apiKey, setApiKey] = useState(()=>getKey());
  const [state,dispatch]    = useReducer(reducer, INIT);

  // Retry: fetch candle data only and update technicals without re-running full analysis
  const handleRetryChart = async () => {
    if (!state.results) return false;
    const sym  = state.results.symbol;
    const t    = `token=${apiKey}`;
    const now2 = Math.floor(Date.now()/1000);
    const from = now2 - 210*24*60*60;
    const url  = `${FH}/stock/candle?symbol=${sym}&resolution=D&from=${from}&to=${now2}&${t}`;
    try {
      const res   = await safeFetch(url, 25000).catch(()=>null);
      const daily = res ? await res.json().catch(()=>null) : null;
      const tech  = calculateTechnicals(daily, null, state.results.price, state.results.rawMetric);
      dispatch({type:'UPDATE_TECH', v:tech});
      return !tech.metricOnly; // true = chart data loaded successfully
    } catch(e) { return false; }
  };

  if (!apiKey) return <KeyScreen onSave={k=>{saveKey(k); setApiKey(k);}}/>;

  return (
    <div className="app">
      {state.step==='home'    && <HomeScreen state={state} dispatch={dispatch} apiKey={apiKey}
                                   onResetKey={()=>{localStorage.removeItem('sa_fh_key'); setApiKey('');}}/>}
      {state.step==='loading' && <LoadingScreen ticker={state.ticker}/>}
      {state.step==='error'   && <ErrorScreen error={state.error} dispatch={dispatch}/>}
      {state.step==='results' && <ResultsScreen r={state.results} dispatch={dispatch} onRetryChart={handleRetryChart}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
