/* ═══════════════════════════════════════════

const AV = 'https://www.alphavantage.co/query';
// ─── Embedded key: friends use the app without needing their own key ──────────
const EMBEDDED_KEY = '5F5DJ4ZFLR7FJPGV';

/* ═══════════════════════════════════════════
   API LAYER  (Alpha Vantage)
═══════════════════════════════════════════ */
function getSectorPe(sector, industry) {
  const text = ((sector||'') + ' ' + (industry||'')).toLowerCase();
  for (const [k, v] of Object.entries(SECTOR_PE_US))
    if (text.includes(k.toLowerCase())) return v;
  return 22;
}

// Cache fundamentals for 23h (AV data is quarterly — no need to refetch daily)
const CACHE_TTL = 23 * 60 * 60 * 1000;
function getCache(ticker, key) {
  try {
    const raw = localStorage.getItem(`sa_${key}_${ticker}`);
    if (!raw) return null;
    const {ts, data} = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem(`sa_${key}_${ticker}`); return null; }
    return data;
  } catch(e) { return null; }
}
function setCache(ticker, key, data) {
  try { localStorage.setItem(`sa_${key}_${ticker}`, JSON.stringify({ts: Date.now(), data})); } catch(e) {}
}

function avRateError(msg) {
  const isDaily = msg.includes('25') || msg.includes('per day') || msg.includes('daily');
  throw new Error(isDaily
    ? 'Daily API limit reached (25 calls/day). Resets at midnight UTC.\nTip: wait until tomorrow or upgrade at alphavantage.co/premium.'
    : 'Rate limit hit — max 5 requests/min. Wait 60 seconds and try again.');
}

async function fetchAll(rawTicker) {
  const apiKey = EMBEDDED_KEY;
  const sym = rawTicker.toUpperCase();

  // Pull from cache when possible (saves 2 of 4 daily calls on repeat analyses)
  let ov = getCache(sym, 'ov');
  let inc = getCache(sym, 'inc');

  if (!ov) {
    const r = await fetch(`${AV}?function=OVERVIEW&symbol=${sym}&apikey=${apiKey}`);
    ov = await r.json();
    const msg = ((ov['Note']||ov['Information'])||'').toLowerCase();
    if (msg && (msg.includes('rate')||msg.includes('standard api')||msg.includes('limit'))) avRateError(msg);
    if (!ov.Symbol && !ov.Name)
      throw new Error(`"${sym}" not found. Check the ticker symbol (e.g. AAPL, NVDA, INTC, MSFT).`);
    setCache(sym, 'ov', ov);
  }

  const sixMonthsAgo = new Date(Date.now()-180*24*60*60*1000).toISOString().split('T')[0];
  const fetches = [
    fetch(`${AV}?function=GLOBAL_QUOTE&symbol=${sym}&apikey=${apiKey}`),
    fetch(`${AV}?function=NEWS_SENTIMENT&tickers=${sym}&apikey=${apiKey}&limit=50`),
    fetch(`https://efts.sec.gov/LATEST/search-index?q=%22${sym}%22&forms=4&dateRange=custom&startdt=${sixMonthsAgo}`).catch(()=>null),
  ];
  if (!inc) fetches.unshift(fetch(`${AV}?function=INCOME_STATEMENT&symbol=${sym}&apikey=${apiKey}`));

  const results = await Promise.all(fetches);
  let qR, newsR, edgarR, incR;
  if (!inc) [incR, qR, newsR, edgarR] = results;
  else      [qR, newsR, edgarR] = results;

  const [q, news] = await Promise.all([qR.json(), newsR.json()]);
  const edgar = edgarR ? await edgarR.json().catch(()=>null) : null;

  if (!inc) {
    inc = await incR.json();
    const m = ((inc['Note']||inc['Information'])||'').toLowerCase();
    if (m && (m.includes('rate')||m.includes('standard api')||m.includes('limit'))) avRateError(m);
    setCache(sym, 'inc', inc);
  }
  for (const d of [q, news]) {
    const m = ((d['Note']||d['Information'])||'').toLowerCase();
    if (m && (m.includes('rate')||m.includes('standard api')||m.includes('limit'))) avRateError(m);
  }
  return { ov, inc, q, news, edgar };
}

// Extract revenue from an income statement report, trying multiple field names
// Alpha Vantage uses different fields for different company types
function extractRevenue(report) {
  const fields = ['totalRevenue','totalRevenueAsReported','revenues','netRevenues',
                  'netIncome','totalNonInterestIncome','totalInterestAndDividendIncome'];
  for (const f of fields) {
    const v = parseFloat(report[f]);
    if (!isNaN(v) && v > 0) return v;
  }
  return null;
}

function n(v) { const x = parseFloat(v); return isNaN(x) ? null : x; }
function pct(v) { const x = n(v); return x === null ? null : x > 1 ? x : x * 100; }
function fmtM(v) {
  if (!v||v==='None') return null;
  const x=parseFloat(v);
  if (isNaN(x)||x===0) return null;
  return x>=1e12?`$${(x/1e12).toFixed(2)}T`:x>=1e9?`$${(x/1e9).toFixed(1)}B`:x>=1e6?`$${(x/1e6).toFixed(0)}M`:null;
}

/* ═══════════════════════════════════════════
   SCORING ENGINE — ALL 8 FILTERS AUTO
═══════════════════════════════════════════ */

// F1: Revenue Growth (5-year)
function scoreF1(growths) {
  if (!growths?.length) return { score:0, avg:0, trend:'unknown', count:0, reason:'Revenue history unavailable.' };
  const vals = growths.map(parseFloat).filter(v=>!isNaN(v));
  if (!vals.length) return { score:0, avg:0, trend:'unknown', count:0, reason:'Revenue data could not be parsed.' };
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  let trend='stable';
  if (vals.length>=3) {
    const mid=Math.floor(vals.length/2);
    const fa=vals.slice(0,mid).reduce((a,b)=>a+b,0)/mid;
    const la=vals.slice(-mid).reduce((a,b)=>a+b,0)/mid;
    if (la>fa+5) trend='accelerating'; else if (la<fa-5) trend='decelerating';
  }
  let base=avg<0?1:avg<5?2.5:avg<10?5:avg<20?7:avg<40?9:10;
  if (trend==='accelerating') base=Math.min(10,base+0.5);
  if (trend==='decelerating') base=Math.max(1,base-1);
  const score=parseFloat(Math.min(10,Math.max(1,base)).toFixed(1));
  const trendLabel=trend==='accelerating'?'↑ Accelerating':trend==='decelerating'?'↓ Decelerating':'→ Stable';
  const reason=`5-year avg revenue growth: ${avg>0?'+':''}${avg.toFixed(1)}%. Trend: ${trendLabel}. `
    +(avg<0?'Declining revenue is a red flag — business may be in structural decline.'
      :avg<5?'Near-stagnant growth. Barely keeping pace with inflation.'
      :avg<10?'Moderate, steady growth. Solid but not exciting.'
      :avg<20?'Double-digit growth. Business is genuinely expanding.'
      :avg<40?'Strong revenue acceleration. Wealth-compounding territory.'
      :'Exceptional growth. Elite-tier revenue expansion.');
  return { score, avg:parseFloat(avg.toFixed(1)), trend, count:vals.length, reason };
}

// F2: Competitive Position — auto from gross margin, op margin, beta, consistency
function scoreF2(ov, growths) {
  let pts=0, max=0, bullets=[];
  const gProfit=n(ov.GrossProfitTTM), rev=n(ov.RevenueTTM);
  const opM=pct(ov.OperatingMarginTTM), beta=n(ov.Beta), mktCap=n(ov.MarketCapitalization);

  if (gProfit!==null && rev!==null && rev>0) {
    const gm=(gProfit/rev*100);
    max+=3; pts+=gm>=70?3:gm>=50?2:gm>=30?1:0.3;
    bullets.push(`Gross margin: ${gm.toFixed(0)}% ${gm>=70?'(elite pricing power ✓)':gm>=50?'(strong ✓)':gm>=30?'(moderate)':'(thin — competitive pressure)'}`);
  }
  if (opM!==null) {
    max+=2; pts+=opM>=25?2:opM>=15?1.5:opM>=5?1:opM>0?0.5:0;
    bullets.push(`Operating margin: ${opM.toFixed(1)}% ${opM>=25?'(highly efficient ✓)':opM>=10?'(healthy)':opM>0?'(lean)':'(loss-making — watch closely)'}`);
  }
  if (growths?.length>=3) {
    const pos=growths.filter(g=>parseFloat(g)>0).length;
    max+=2; pts+=pos>=4?2:pos>=3?1.5:pos>=2?1:0.5;
    bullets.push(`Revenue positive in ${pos}/${growths.length} years ${pos>=4?'(consistent growth ✓)':'(inconsistent)'}`);
  }
  if (beta!==null && beta>0) {
    max+=2; pts+=beta<=0.8?2:beta<=1.2?1.5:beta<=1.8?1:0.5;
    bullets.push(`Beta: ${beta.toFixed(2)} ${beta<=0.8?'(defensive/stable ✓)':beta<=1.2?'(market-level)':'(high volatility)'}`);
  }
  if (mktCap!==null) {
    max+=1; pts+=mktCap>=50e9?1:mktCap>=10e9?.7:mktCap>=1e9?.4:.1;
    bullets.push(`Market cap: ${fmtM(ov.MarketCapitalization)||'—'} ${mktCap>=50e9?'(established brand ✓)':mktCap>=10e9?'(mid-size)':'(small-cap)'}`);
  }
  if (!max) return { score:5, reason:'Insufficient data to score competitive position.' };
  const score=parseFloat(Math.min(10,Math.max(1,(pts/max)*10)).toFixed(1));
  return { score, reason: bullets.join('. ')+'.' };
}

// F3: Leadership Integrity — auto from insider %, ROE, margins, consistency
function scoreF3(ov, growths) {
  let pts=0, max=0, bullets=[];
  const insiderPct=pct(ov.PercentInsidersOwnership);
  const roe=pct(ov.ReturnOnEquityTTM), pm=pct(ov.ProfitMargin);

  if (insiderPct!==null) {
    max+=4; pts+=insiderPct>=20?4:insiderPct>=10?3.5:insiderPct>=5?3:insiderPct>=2?2:insiderPct>=0.5?1:0.5;
    bullets.push(`Insider ownership: ${insiderPct.toFixed(1)}% ${insiderPct>=10?'(strong skin-in-the-game ✓)':insiderPct>=5?'(meaningful ✓)':insiderPct>=1?'(low)':'(negligible — misalignment risk)'}`);
  }
  if (roe!==null) {
    max+=2; pts+=roe>=25?2:roe>=15?1.5:roe>=5?1:roe>0?.5:0;
    bullets.push(`Return on equity: ${roe.toFixed(1)}% ${roe>=25?'(excellent capital allocation ✓)':roe>=10?'(solid)':roe>0?'(moderate)':'(negative — capital destruction risk)'}`);
  }
  if (pm!==null) {
    max+=2; pts+=pm>=20?2:pm>=10?1.5:pm>=0?1:0;
    bullets.push(`Profit margin: ${pm.toFixed(1)}% ${pm>=20?'(highly profitable ✓)':pm>=5?'(positive)':pm>=0?'(breakeven)':'(loss-making)'}`);
  }
  if (growths?.length>=3) {
    const pos=growths.filter(g=>parseFloat(g)>0).length;
    max+=2; pts+=pos>=4?2:pos>=3?1.5:pos>=2?1:0.5;
    bullets.push(`Execution track record: ${pos}/${growths.length} years of growth ${pos>=4?'(consistent delivery ✓)':'(inconsistent)'}`);
  }
  if (!max) return { score:5, reason:'Insufficient data to score leadership quality.' };
  const score=parseFloat(Math.min(10,Math.max(1,(pts/max)*10)).toFixed(1));
  return { score, reason: bullets.join('. ')+'.' };
}

// F4: Market Timing — auto from 52-wk position, analyst target, recent growth
function scoreF4(ov, currentPrice) {
  let pts=0, max=0, bullets=[];
  const wk52H=n(ov['52WeekHigh']), wk52L=n(ov['52WeekLow']);
  const target=n(ov.AnalystTargetPrice), qGrowth=pct(ov.QuarterlyRevenueGrowthYOY);

  if (currentPrice>0 && wk52H>0) {
    const pctBelow=(1-currentPrice/wk52H)*100;
    max+=4; pts+=pctBelow>=50?4:pctBelow>=30?3.5:pctBelow>=20?3:pctBelow>=10?2:pctBelow>=5?1:0.5;
    bullets.push(`${pctBelow.toFixed(0)}% below 52-week high of $${wk52H.toFixed(2)} ${pctBelow>=25?'(opportunity window open ✓)':pctBelow>=10?'(mild pullback)':'(near 52-week high — limited upside from here)'}`);
  }
  if (target!==null && currentPrice>0) {
    const upside=((target-currentPrice)/currentPrice*100);
    max+=3; pts+=upside>=50?3:upside>=25?2.5:upside>=10?2:upside>0?1.5:0.5;
    bullets.push(`Analyst 12-month target: $${target.toFixed(2)} (${upside>=0?'+':''}${upside.toFixed(0)}% upside) ${upside>=25?'(strong consensus ✓)':upside>0?'(modest upside)':'(downside risk flagged by analysts)'}`);
  }
  if (qGrowth!==null) {
    max+=3; pts+=qGrowth>=30?3:qGrowth>=15?2.5:qGrowth>=5?2:qGrowth>=0?1:0.5;
    bullets.push(`Most recent quarterly revenue growth: ${qGrowth>0?'+':''}${qGrowth.toFixed(1)}% YoY ${qGrowth>=20?'(accelerating momentum ✓)':qGrowth>=5?'(positive)':'(slowing — timing caution)'}`);
  }
  if (!max) return { score:5, reason:'Insufficient price or analyst data for timing assessment.' };
  const score=parseFloat(Math.min(10,Math.max(1,(pts/max)*10)).toFixed(1));
  return { score, reason: bullets.join('. ')+'.' };
}

// F5: Risk Assessment — beta, profitability, stability, size
function scoreF5(ov, growths) {
  let pts=0, max=0, bullets=[];
  const beta=n(ov.Beta), pm=pct(ov.ProfitMargin), mktCap=n(ov.MarketCapitalization);

  if (beta!==null && beta>0) {
    max+=4; pts+=beta<=0.5?4:beta<=0.8?3.5:beta<=1.0?3:beta<=1.3?2.5:beta<=1.7?2:beta<=2.0?1.5:1;
    bullets.push(`Beta: ${beta.toFixed(2)} ${beta<=0.8?'(low volatility — stable risk ✓)':beta<=1.2?'(market-level risk)':beta<=1.7?'(elevated volatility)':'(high beta — significant downside risk)'}`);
  }
  if (pm!==null) {
    max+=3; pts+=pm>=20?3:pm>=10?2.5:pm>=0?2:pm>=-10?1:0.5;
    bullets.push(`Profit margin: ${pm.toFixed(1)}% ${pm>=15?'(profitable — lower financial risk ✓)':pm>=0?'(marginally profitable)':'(loss-making — cash burn risk)'}`);
  }
  if (growths?.length>=3) {
    const noMajorDip=growths.every(g=>parseFloat(g)>-25);
    max+=2; pts+=noMajorDip?2:1;
    bullets.push(noMajorDip?'No major revenue collapse in 5 years (stable business ✓)':'Revenue dipped >25% in at least 1 year (cyclicality risk)');
  }
  if (mktCap!==null) {
    max+=1; pts+=mktCap>=100e9?1:mktCap>=10e9?.8:mktCap>=1e9?.5:.2;
    bullets.push(`${fmtM(ov.MarketCapitalization)||'small'} market cap ${mktCap>=10e9?'(size = stability ✓)':'(small-cap = higher risk)'}`);
  }
  if (!max) return { score:5, reason:'Insufficient data to score risk.' };
  const score=parseFloat(Math.min(10,Math.max(1,(pts/max)*10)).toFixed(1));
  return { score, reason: bullets.join('. ')+'.' };
}

// F6: Valuation — P/E vs sector + index, P/B, P/S, PEG
function scoreF6(ov) {
  const sector=ov.Sector||'', industry=ov.Industry||'';
  const sectorPe=getSectorPe(sector,industry), indexPe=22;
  const scores=[]; let bullets=[];

  function pePts(r){return r<=.7?3:r<=.85?2.5:r<=1?2:r<=1.15?1.5:r<=1.3?1:.5;}

  const pe=n(ov.PERatio), pb=n(ov.PriceToBookRatio), ps=n(ov.PriceToSalesRatioTTM), peg=n(ov.PEGRatio);

  if (pe!==null && pe>0) {
    scores.push({pts:pePts(pe/sectorPe),max:3});
    bullets.push(`P/E ${pe.toFixed(1)}x vs sector avg ${sectorPe}x ${pe<sectorPe?'(trading at discount ✓)':'(trading at premium)'}`);
    scores.push({pts:pePts(pe/indexPe),max:3});
    bullets.push(`P/E ${pe.toFixed(1)}x vs S&P 500 avg ${indexPe}x`);
  } else {
    bullets.push('P/E: N/A (loss-making or not reported — excluded from score)');
  }
  if (pb!==null && pb>0) {
    const pts=pb<=1?2:pb<=2?1.5:pb<=3?1:pb<=5?.5:0;
    scores.push({pts,max:2});
    bullets.push(`P/B ${pb.toFixed(1)}x ${pb<=2?'(attractive ✓)':pb<=4?'(elevated)':'(expensive)'}`);
  }
  if (ps!==null && ps>0) {
    const pts=ps<=1?2:ps<=3?1.5:ps<=5?1:ps<=10?.5:0;
    scores.push({pts,max:2});
    bullets.push(`P/S ${ps.toFixed(1)}x ${ps<=3?'(reasonable ✓)':ps<=8?'(growth premium)':'(very expensive on revenue basis)'}`);
  }
  if (peg!==null && peg>0) {
    const pts=peg<=.5?2:peg<=1?1.5:peg<=1.5?1:peg<=2?.5:0;
    scores.push({pts,max:2});
    bullets.push(`PEG ${peg.toFixed(1)} ${peg<=1?'(undervalued growth ✓)':peg<=1.5?'(fairly priced for growth)':'(expensive relative to growth rate)'}`);
  }

  if (!scores.length) return { score:0, reason:'No valuation data available from API for this ticker.' };
  const tot=scores.reduce((s,x)=>s+x.pts,0), mx=scores.reduce((s,x)=>s+x.max,0);
  const score=parseFloat(Math.min(10,Math.max(1,(tot/mx)*10)).toFixed(1));
  return { score, reason: bullets.join('. ')+'.' };
}

// F7: AI Advantage — description + known list + news
function scoreF7(ov, news, symbol) {
  const sym=(symbol||'').toUpperCase();
  const desc=((ov.Description||'')+' '+(ov.Sector||'')+' '+(ov.Industry||'')).toLowerCase();
  const newsText=(news?.feed||[]).slice(0,20).map(n=>(n.title+' '+(n.summary||'')).toLowerCase()).join(' ');

  // Known leaders
  if (AI_LEADERS.has(sym)) {
    const reason=`${sym} is a recognized AI leader. `
      +(sym==='NVDA'?'NVIDIA dominates AI compute with unmatched GPU/CUDA ecosystem — the picks-and-shovels of the AI gold rush.'
        :sym==='MSFT'?'Microsoft embedded AI across Azure, Office 365, and Copilot — OpenAI partnership creates deep moat.'
        :sym==='PLTR'?'Palantir\'s AIP platform has military-grade AI moat in government and enterprise data analytics.'
        :sym==='META'?'Meta\'s open-source Llama models + massive social data flywheel creates strong AI competitive position.'
        :sym==='GOOGL'||sym==='GOOG'?'Google/Alphabet owns DeepMind, Gemini, and the world\'s largest AI training dataset.'
        :sym==='AMD'?'AMD\'s MI300 series directly competes with NVIDIA for AI data center workloads.'
        :'Established AI platform with measurable competitive advantages in the AI ecosystem.');
    return { score:10, level:'leader', reason };
  }

  // Keyword analysis
  const strongKW=['artificial intelligence','large language model','generative ai','llm','ai platform',
    'deep learning','neural network','computer vision','nlp','natural language processing'];
  const modKW=['machine learning','ai-powered','ai capabilities','predictive analytics',
    'intelligent automation','cognitive computing'];

  const strongHits=strongKW.filter(k=>desc.includes(k)||newsText.includes(k)).length;
  const modHits=modKW.filter(k=>desc.includes(k)).length;
  const aiInNews=(news?.feed||[]).slice(0,10)
    .filter(n=>(n.title+' '+(n.summary||'')).toLowerCase().includes('artificial intelligence')||
                (n.title+' '+(n.summary||'')).toLowerCase().includes('ai model')).length;

  if (strongHits>=3||(strongHits>=2&&modHits>=2)) {
    const mktCap=n(ov.MarketCapitalization)||0;
    if (mktCap>=20e9) {
      return { score:10, level:'leader', reason:`Strong AI moat detected: ${strongHits} core AI capabilities in business model. Large-cap position suggests established competitive advantage.` };
    }
    return { score:7, level:'strong', reason:`Meaningful AI capabilities (${strongHits} core indicators). Building strong position but competing against larger incumbents.` };
  }
  if (strongHits>=1||modHits>=3||aiInNews>=3) {
    return { score:5, level:'participant', reason:`AI is part of the business model but not the primary moat. ${strongHits} strong + ${modHits} moderate AI indicators. Lagging the AI leaders.` };
  }
  if (modHits>=1||aiInNews>=1) {
    return { score:3, level:'adjacent', reason:`Peripheral AI exposure — using AI in products but no clear AI competitive edge. Adjacent beneficiary at best.` };
  }
  return { score:0, level:'none', reason:'No meaningful AI footprint in business description or recent news.' };
}

// F8: Whale & Insider Activity — news (article-level matching) + SEC EDGAR Form 4
function scoreF8(ov, news, edgar) {
  const newsItems=(news?.feed||[]).slice(0,50);

  // Broad buy/sell term lists — catches "purchase", "disclosed", "investment" etc.
  const buyTerms=['buys','buy','bought','purchased','purchase','purchases','acquires','acquiring',
    'increases stake','adds to','backs','invests','investment','invests in','bets on',
    'building position','disclosed buying','disclosed purchase','disclosed investment',
    'disclosed stake','13f','accumulating','loading up','takes stake','takes position',
    'new position','initiates position','adds stake','increases position','boosts stake',
    'betting on','backing','insider buy'];
  const sellTerms=['sells','sell','sold','dumped','reduces stake','exits','trims','offloads',
    'cuts position','divests','liquidates','decreases stake','reduces position',
    'exiting position','closing position','trimmed stake','insider sell'];

  // Article-level matching: whale name + buy/sell term anywhere in the SAME article
  const detected=[];
  for (const whale of WHALES) {
    const wArticles=newsItems.filter(item=>{
      const text=(item.title+' '+(item.summary||'')).toLowerCase();
      return whale.terms.some(t=>text.includes(t));
    });
    if (!wArticles.length) continue;
    const buying=wArticles.some(item=>{
      const text=(item.title+' '+(item.summary||'')).toLowerCase();
      return buyTerms.some(t=>text.includes(t));
    });
    const selling=wArticles.some(item=>{
      const text=(item.title+' '+(item.summary||'')).toLowerCase();
      return sellTerms.some(t=>text.includes(t));
    });
    // Capture headline for display
    const headline=wArticles[0]?.title||'';
    detected.push({...whale, buying, selling, headline});
  }

  // SEC EDGAR Form 4 — actual insider trade filings (corporate insiders only)
  const edgarHits=edgar?.hits?.hits||[];
  const recentInsiderCount=edgarHits.length;
  // display_names sometimes contains both company and filer names; filter out the company
  const ovName=(ov.Name||'').toLowerCase();
  const insiderNames=[...new Set(
    edgarHits.flatMap(h=>(h._source?.display_names||[]))
      .filter(name=>{
        const lc=name.toLowerCase();
        return lc && !lc.includes('inc') && !lc.includes('corp') && !lc.includes('ltd')
          && !lc.includes('llc') && !ovName.split(' ').some(w=>w.length>3&&lc.includes(w));
      })
  )].slice(0,6);

  // Insider & institutional %
  const insiderPct=pct(ov.PercentInsidersOwnership)||0;
  const instPct=pct(ov.PercentInstitutionalOwnership)||0;

  // News sentiment
  const sentiments=newsItems.map(n=>n.overall_sentiment_label||'').filter(Boolean);
  const bullish=sentiments.filter(s=>s.toLowerCase().includes('bullish')).length;
  const bearish=sentiments.filter(s=>s.toLowerCase().includes('bearish')).length;
  const sentimentScore=sentiments.length>0?Math.round((bullish/sentiments.length)*10):5;

  const buyWhales=detected.filter(w=>w.buying);
  const sellWhales=detected.filter(w=>w.selling);
  const mentionedWhales=detected.filter(w=>!w.buying&&!w.selling);

  let score=5;
  if (buyWhales.length>=3) score=10;
  else if (buyWhales.length===2) score=9;
  else if (buyWhales.length===1) score=8;
  else if (mentionedWhales.length>=2) score=7;
  else if (mentionedWhales.length===1) score=6.5;
  else if (sellWhales.length>=1) score=3;

  if (insiderPct>=15) score=Math.min(10,score+0.5);
  else if (insiderPct>=5) score=Math.min(10,score+0.25);
  if (recentInsiderCount>=5) score=Math.min(10,score+0.5);
  else if (recentInsiderCount>=2) score=Math.min(10,score+0.25);

  score=parseFloat(((score*0.75)+(sentimentScore*0.25)).toFixed(1));

  let reason='';
  if (buyWhales.length)
    reason+=`🐋 Buying: ${buyWhales.map(w=>w.icon+' '+w.name).join(', ')}. `;
  if (sellWhales.length)
    reason+=`⚠️ Selling: ${sellWhales.map(w=>w.icon+' '+w.name).join(', ')}. `;
  if (mentionedWhales.length)
    reason+=`👀 Mentioned in news: ${mentionedWhales.map(w=>w.icon+' '+w.name).join(', ')} (direction unclear). `;
  if (recentInsiderCount>0) {
    reason+=`📋 ${recentInsiderCount} insider Form 4 filing${recentInsiderCount>1?'s':''} (SEC, last 6mo). `;
    if (insiderNames.length) reason+=`Filers include: ${insiderNames.join(', ')}. `;
  }
  reason+=`Insider ownership: ${insiderPct.toFixed(1)}%. Institutional: ${instPct.toFixed(0)}%. `;
  reason+=`News: ${bullish} bullish / ${bearish} bearish of ${sentiments.length} articles.`;
  if (!detected.length && insiderPct<2 && recentInsiderCount===0)
    reason='No notable whale activity in recent news. '+reason;

  return { score:Math.min(10,Math.max(1,score)), detected, insiderNames,
           recentInsiderCount, insiderPct, instPct, bullish, bearish,
           total:sentiments.length, reason };
}

function calcFinal(results) {
  // F7 score of 0 = not an AI stock = excluded
  const active=Object.values(results).filter(r=>r&&r.score>0);
  if (!active.length) return 0;
  return parseFloat((active.reduce((s,r)=>s+r.score,0)/active.length).toFixed(1));
}

function verdict(s) {
  if (s>=8.5) return {label:'STRONG BUY',color:'#22c55e',bg:'#22c55e12',emoji:'🚀'};
  if (s>=7)   return {label:'BUY',        color:'#4ade80',bg:'#4ade8012',emoji:'✅'};
  if (s>=5.5) return {label:'HOLD',       color:'#eab308',bg:'#eab30812',emoji:'⏸️'};
  if (s>=4)   return {label:'REVIEW',     color:'#f97316',bg:'#f9731612',emoji:'⚠️'};
  return             {label:'SELL',       color:'#ef4444',bg:'#ef444412',emoji:'🔴'};
}

function sc(s) {
  if (!s||s===0) return '#475569';
  if (s>=8) return '#22c55e'; if (s>=6) return '#3b82f6';
  if (s>=4) return '#eab308'; return '#ef4444';
}

const INIT={ticker:'',step:'home',results:null,error:null};

function reducer(state,action) {
  switch(action.type) {
    case 'TICKER': return {...state,ticker:action.v.toUpperCase()};
    case 'LOAD':   return {...state,step:'loading',error:null};
    case 'DONE':   return {...state,step:'results',results:action.v};
    case 'ERR':    return {...state,step:'error',error:action.v};
    case 'RESET':  return INIT;
    default: return state;
  }
}

function Ring({score,size=90,sw=9}) {
  const r=(size-sw)/2,c=2*Math.PI*r;
  const fill=Math.max(0,Math.min(10,score))/10*c;
  const col=sc(score);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth={sw}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth={sw}
        strokeDasharray={`${fill} ${c}`} strokeLinecap="round"
        style={{transition:'stroke-dasharray .6s ease'}}/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
        fill={score===0?'#475569':col} fontSize={size/4} fontWeight="800"
        style={{transform:`rotate(90deg)`,transformOrigin:`${size/2}px ${size/2}px`,fontFamily:'system-ui'}}>
        {score===0?'—':score.toFixed(1)}
      </text>
    </svg>
  );
}

}

      </div>

      {/* 8-filter mini grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:18}}>
        {[{e:'📈',l:'Revenue',r:f1},{e:'🏰',l:'Moat',r:f2},{e:'🧭',l:'Leadership',r:f3},
          {e:'⏱️',l:'Timing',r:f4},{e:'🛡️',l:'Risk',r:f5},{e:'💰',l:'Valuation',r:f6},
          {e:'🤖',l:'AI Edge',r:f7},{e:'🐋',l:'Whales',r:f8}
        ].map(({e,l,r})=><MiniScore key={l} score={r.score} label={l} emoji={e}/>)}
      </div>

      {/* Revenue year strip */}
      {d.growths?.length>0&&(
        <div style={{background:'#1e293b',borderRadius:12,padding:'12px 14px',marginBottom:14,
          border:'1px solid #334155'}}>
          <div style={{fontSize:11,color:'#3b82f6',fontWeight:'700',textTransform:'uppercase',
            letterSpacing:'.5px',marginBottom:8}}>Revenue Growth — Year by Year</div>
          <div style={{display:'flex',gap:4}}>
            {d.growths.map((g,i)=>{
              const v=parseFloat(g);
              const col=v>=20?'#22c55e':v>=10?'#3b82f6':v>=0?'#eab308':'#ef4444';
              return (
                <div key={i} style={{flex:1,textAlign:'center',background:'#0f172a',borderRadius:8,padding:'8px 4px'}}>
                  <div style={{fontSize:12,fontWeight:'800',color:col}}>{v>0?'+':''}{g}%</div>
                  {d.reportedYears?.[i+1]&&<div style={{fontSize:9,color:'#475569',marginTop:2}}>{d.reportedYears[i+1]}</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── FILTER CARDS ── */}
      <div style={{fontSize:11,color:'#64748b',fontWeight:'700',textTransform:'uppercase',
        letterSpacing:'.6px',marginBottom:12}}>Detailed Breakdown</div>

      <FilterCard emoji="📈" title="Revenue Growth" score={f1.score} reason={f1.reason}/>
      <FilterCard emoji="🏰" title="Competitive Position" score={f2.score} reason={f2.reason}/>
      <FilterCard emoji="🧭" title="Leadership & Integrity" score={f3.score} reason={f3.reason}/>
      <FilterCard emoji="⏱️" title="Market Timing" score={f4.score} reason={f4.reason}>
        {d.analystTarget&&d.curPrice>0&&(
          <div style={{marginTop:8,background:'#0f172a',borderRadius:8,padding:'8px 10px',
            display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:'#64748b'}}>Analyst 12-month target</span>
            <span style={{fontSize:14,fontWeight:'800',color:'#3b82f6'}}>
              {d.currency}{d.analystTarget.toFixed(2)}
              <span style={{fontSize:11,fontWeight:'600',color:'#64748b',marginLeft:6}}>
                ({((d.analystTarget/d.curPrice-1)*100).toFixed(0)}% upside)
              </span>
            </span>
          </div>
        )}
      </FilterCard>
      <FilterCard emoji="🛡️" title="Risk Assessment" score={f5.score} reason={f5.reason}/>
      <FilterCard emoji="💰" title="Valuation" score={f6.score} reason={f6.reason}/>

      {/* AI Advantage card */}
      <FilterCard emoji="🤖" title="AI Advantage" score={f7.score} reason={f7.reason}
        badge={aiLevelLabel} badgeColor={aiColor}>
        {f7.score===0&&(
          <div style={{marginTop:6,fontSize:12,color:'#475569',fontStyle:'italic'}}>
            Score excluded from final average — not applicable for non-AI businesses.
          </div>
        )}
      </FilterCard>

      {/* Whale / Insider card */}
      <FilterCard emoji="🐋" title="Whale & Insider Activity" score={f8.score} reason={f8.reason}>
        {f8.detected?.length>0&&(
          <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:6}}>
            {f8.detected.map((w,i)=>(
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'8px 10px',
                background:w.buying?'#22c55e15':w.selling?'#ef444415':'#3b82f615',
                borderRadius:8,border:`1px solid ${w.buying?'#22c55e30':w.selling?'#ef444430':'#3b82f630'}`}}>
                <span style={{fontSize:20,flexShrink:0}}>{w.icon}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:'700'}}>{w.name}</div>
                  <div style={{fontSize:11,color:w.buying?'#22c55e':w.selling?'#ef4444':'#94a3b8',fontWeight:'600'}}>
                    {w.buying?'📈 Buying activity detected':w.selling?'📉 Selling activity detected':'👀 Mentioned in news'}
                  </div>
                  {w.headline&&<div style={{fontSize:10,color:'#475569',marginTop:3,lineHeight:1.4,
                    overflow:'hidden',textOverflow:'ellipsis',display:'-webkit-box',
                    WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>"{w.headline}"</div>}
                </div>
              </div>
            ))}
          </div>
        )}
        {f8.recentInsiderCount>0&&(
          <div style={{marginTop:8,background:'#0f172a',borderRadius:8,padding:'8px 10px',
            border:'1px solid #1e40af30'}}>
            <div style={{fontSize:11,color:'#3b82f6',fontWeight:'700',marginBottom:3}}>
              📋 SEC Form 4 — {f8.recentInsiderCount} insider filing{f8.recentInsiderCount>1?'s':''} in last 6 months
            </div>
            {f8.insiderNames?.length>0&&(
              <div style={{fontSize:11,color:'#64748b'}}>Filers: {f8.insiderNames.join(' · ')}</div>
            )}
          </div>
        )}
        <div style={{marginTop:8,display:'flex',gap:8}}>
          {[['🟢 Bullish',f8.bullish,'#22c55e'],['🔴 Bearish',f8.bearish,'#ef4444'],
            ['📰 Total news',f8.total,'#3b82f6']].map(([lbl,v,col])=>(
            <div key={lbl} style={{flex:1,background:'#0f172a',borderRadius:8,padding:'7px 8px',textAlign:'center',
              border:`1px solid ${col}20`}}>
              <div style={{fontSize:14,fontWeight:'800',color:col}}>{v}</div>
              <div style={{fontSize:10,color:'#475569',marginTop:1}}>{lbl.split(' ').slice(1).join(' ')}</div>
            </div>
          ))}
        </div>
      </FilterCard>

      <div style={{background:'#1e293b',borderRadius:11,padding:12,marginBottom:14,border:'1px solid #334155'}}>
        <p style={{fontSize:11,color:'#475569',lineHeight:1.6,textAlign:'center'}}>
          ⚠️ For educational purposes only. Not financial advice. Always do your own research.
        </p>
      </div>

      <button onClick={()=>dispatch({type:'RESET'})}
        style={{width:'100%',background:'#3b82f6',color:'#fff',borderRadius:12,padding:14,
          fontSize:15,fontWeight:'700'}}>
        ← Analyze Another Stock
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════════
   APP
═══════════════════════════════════════════ */
function App() {
  const [state,dispatch]=useReducer(reducer,INIT);
  const {step,ticker,results}=state;
  const isResult=step==='results';

  return (
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh',background:'#0f172a'}}>
      {isResult&&(
        <div style={{display:'flex',alignItems:'center',padding:'11px 20px',
          background:'#0a1122',borderBottom:'1px solid #1e293b',flexShrink:0}}>
          <button onClick={()=>dispatch({type:'RESET'})}
            style={{background:'none',color:'#64748b',fontSize:20,padding:'2px 10px 2px 0'}}>‹</button>
          <div>
            <div style={{fontSize:13,fontWeight:'700'}}>
              {results?.name||ticker}
              {results?.symbol&&<span style={{color:'#3b82f6',marginLeft:8,fontSize:12}}>{results.symbol}</span>}
            </div>
            <div style={{fontSize:11,color:'#64748b'}}>Analysis complete · 8 filters</div>
          </div>
        </div>
      )}
      {step==='home'    && <HomeScreen    state={state} dispatch={dispatch}/>}
      {step==='loading' && <LoadingScreen ticker={ticker}/>}
      {step==='error'   && <ErrorScreen   message={state.error} dispatch={dispatch}/>}
      {step==='results' && <ResultsScreen state={state} dispatch={dispatch}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script></body></html>
